swagger: '2.0'
info:
  version: '1.0'
  title: "Payper APIs"
  description: |
    Payper APIs are used to communicate with the various capabilities of the system. For example, generate different types of documents and publish them, pull expenses, check for inventory and stock, etc.  
    <div>All functions are accessed from <b>https://app.payper.co.il/api/...</b></div>

    ### Before You Begin
    To use the API, configure the following settings in the Payper system under **Api Settings**:  
    <ol>
      <li>Obtain your Company <b>api_key</b>.</li>
      <li>Define an <b>api_user</b>.</li>
      <li>Add your <b>IP address</b> to the allowed IPs list.</li>
    </ol>

    ### Sandbox/Tests
    Sandbox mode (applicable only to document generation) has the following behavior:  
    <ul>
      <li>Documents are assigned the number '1'.</li>
      <li>Documents will not be emailed.</li>
    </ul>  
    <b>Note:</b> Sandbox mode is enabled by default. When ready to generate real documents via the API, disable it in the **Api Settings**.
host: app.payper.co.il
basePath: /api
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
tags:
  - name: Generate documents
    description: Create invoices, proformas, bids, receipts, credits, purchase orders, and donation receipts.
  - name: Finance
    description: Financial operations - expense retrieval, daily income reports, document uploads, and proforma cancellation.
  - name: Customers
    description: Customer lookup, details, invoice history, pricing, and general ledger.
  - name: Inventory
    description: Inventory management - stock levels, item details, supplier data, and purchase costs.
security:
  - ApiKeyAuth: []
paths:
  /generate_invoice:
    x-summary: Create Invoice
    post:
      description: |
        This endpoint creates an **Invoice** (חשבונית מס) in the Payper system.
        
        > **Customer Identification:** At least one of `customer_unique_id`, `customer_mail`,
        > or `customer_system_id` is required. If no matching customer is found,
        > a new one is created (requires `customer_name`).
        
        #### Request Parameters  
        <table>
          <tr><th>Attributes</th><th>Parameter</th><th>Required</th></tr>
          <tr><td>customer_unique_id</td><td>string</td><td>Conditional*</td></tr>
          <tr><td>customer_mail</td><td>string</td><td>Conditional*</td></tr>
          <tr><td>customer_name</td><td>string</td><td>For new customer</td></tr>
          <tr><td>customer_mobile</td><td>string</td><td>No</td></tr>
          <tr><td>customer_business_phone</td><td>string</td><td>No</td></tr>
          <tr><td>customer_address</td><td>string</td><td>No</td></tr>
          <tr><td>document_subject</td><td>string</td><td>No</td></tr>
          <tr><td>document_remarks</td><td>string</td><td>No</td></tr>
          <tr><td>document_lang</td><td>enum (hb, en)</td><td>No (default: hb)</td></tr>
          <tr><td>document_payment_due_date</td><td>date</td><td>No</td></tr>
          <tr><td>document_no_vat</td><td>bool</td><td>No (default: false)</td></tr>
          <tr><td>discount</td><td>float</td><td>No</td></tr>
          <tr><td>discount_with_vat</td><td>float</td><td>No</td></tr>
          <tr><td>document_rounded</td><td>bool</td><td>No (default: false)</td></tr>
          <tr><td>send_by_mail</td><td>bool</td><td>No (default: false)</td></tr>
          <tr><td>extra_recipients</td><td>string</td><td>No</td></tr>
          <tr><td>income_id</td><td>integer</td><td>No</td></tr>
          <tr><td>invoice_lines[]</td><td>array</td><td>Yes</td></tr>
        </table>
        <hr/>
      summary: Create Invoice
      operationId: generateInvoice
      tags:
        - Generate documents
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - customer_unique_id
              - customer_mail
            properties:
              customer_unique_id:
                type: string
                description: The Customer business number OR Personal identity number, required if no customer_mail
              customer_mail:
                type: string
                description: The Customer main email address, required if no customer_unique_id
              customer_name:
                type: string
                description: The Customer full name, required for new customer
              customer_mobile:
                type: string
                description: The Customer mobile phone number
              customer_business_phone:
                type: string
                description: The Customer business phone number
              customer_address:
                type: string
                description: The Customer full address
              customer_city:
                type: string
                description: The Customer city
              customer_home_number:
                type: string
                description: The Customer house/building number
              customer_zip_code:
                type: string
                description: The Customer zip code
              customer_system_id:
                type: integer
                description: System ID of an existing customer (alternative to customer_unique_id)
              invoice_date:
                type: string
                format: date
                description: Invoice date in YYYY-MM-DD format (default today)
                example: "2026-03-27"
              order_id:
                type: string
                description: External order reference ID for linking to source system
              document_subject:
                type: string
                description: The Document subject
              document_remarks:
                type: string
                description: The Document remarks
              document_lang:
                type: string
                enum: ['hb', 'en']
                default: 'hb'
                description: The Document language options are as follows | English-en | Hebrew-hb (default)
              document_payment_due_date:
                type: string
                format: 'date dd-mm-yyyy'
                description: The Document payment due date
              document_no_vat:
                type: boolean
                default: false
                description: Don't add vat to price (default-false)
              discount:
                type: number
                default: false
                description: Document discount before vat (default-none)
              discount_with_vat:
                type: number
                default: false
                description: Document discount with vat (default-none)
              document_rounded:
                type: boolean
                default: false
                description: Rounded invoice total for payment (default-false)
              send_by_mail:
                type: boolean
                default: false
                description: Send the document by mail to the customer NOTE customer must have email address (default-false)
              extra_recipients:
                type: string
                description: Add recipients to document mail comma separated (relevant if send_by_mail set to true)
                example: "test@test.com,test2@test.com"
              income_id:
                type: integer
                description: Categories the invoice with income type (For supported company only, income id can be obtained from the system settings)
              invoice_lines:
                type: array
                description: Array of JSON objects - each with Item name, quantity, and price per unit before VAT
                items:
                  type: object
                  required:
                    - description
                    - quantity
                    - price_per_unit
                  properties:
                    description:
                      type: string
                      description: "Name of the item"
                      example: "Office Chair"
                    quantity:
                      type: number
                      description: "Quantity of the item, supports integers or decimals"
                      example: 3
                    price_per_unit:
                      type: number
                      description: "Price per unit before VAT, supports integers or decimals"
                      example: 250.75
                    discount:
                      type: number
                      description: "Per unit discount in NIS"
                      example: 15.5
                    include_vat:
                      type: boolean
                      description: "Whether VAT is included (default: false)"
                      example: false
                    catalog_id:
                      type: string
                      description: "Catalog ID of the item (default: Null)"
                      example: "CAT12345"
                    currency_symbol:
                      type: string
                      description: "Currency symbol (default: ILS)"
                      example: "ILS"
                    conversion_rate:
                      type: number
                      description: "Currency rate (default: based on the exchange rate on invoice date)"
                      example: 3.7
                    conversion_date:
                      type: string
                      format: date
                      description: "Currency exchange date in dd-mm-yyyy format"
                      example: "24-12-2024"
                example:
                  - description: "Office Chair"
                    quantity: 3
                    price_per_unit: 250.75
                    discount: 15.5
                    include_vat: false
                    catalog_id: "CAT12345"
                    currency_symbol: "ILS"
                    conversion_rate: 3.7
                    conversion_date: "24-12-2024"
                  - description: "Desk Lamp"
                    quantity: 2
                    price_per_unit: 150.0
                    include_vat: true
                    catalog_id: "CAT67890"
                    currency_symbol: "USD"
                    conversion_rate: 3.9
                    conversion_date: "25-12-2024"
      responses:
        200:
          description: Request accepted and processed
          schema:
            type: object
            properties:
              result:
                type: string
                default: '200'
              description:
                type: string
                default: "Success"
              document_id:
                type: string
                description: Formatted document number (e.g. "001-2026")
              document_system_id:
                type: integer
              document_link:
                type: string
              pay_invoice_link:
                type: string
        401:
          description: Authentication failed
          schema:
            type: object
            properties:
              result:
                type: string
                example: "110"
              description:
                type: string
                example: "Unknown credentials"
        400:
          description: Validation error (see result code for details)
          schema:
            type: object
            properties:
              result:
                type: string
                description: "Error codes: 130=customer/provider missing, 133=new customer name required, 134=not found, 142=invoice lines invalid, 143=line items invalid, 146=creation error, 147=duplicate, 167=already invoiced"
              description:
                type: string

