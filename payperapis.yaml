                default: '200'
              description:
                type: string
                default: "Success"
              document_id:
                type: string
                description: Formatted document number (e.g. "001-2026")
              document_system_id:
                type: integer
              document_link:
                type: string
        401:
          description: Authentication failed
          schema:
            type: object
            properties:
              result:
                type: string
                example: "110"
              description:
                type: string
                example: "Unknown credentials"
        400:
          description: Validation error (see result code for details)
          schema:
            type: object
            properties:
              result:
                type: string
                description: "Error codes: 130=customer/provider missing, 133=new customer name required, 134=not found, 142=invoice lines invalid, 143=line items invalid, 146=creation error, 147=duplicate, 167=already invoiced"
              description:
                type: string

  /generate_purchase_order:
    x-summary: Create Purchase Order
    post:
      description: |
        This endpoint creates a Purchase Order (PO) in the Payper system.
        #### Provider Identification
        At least one of the following must be provided to identify the provider:
        - `provider_system_id` - Existing provider ID in the system
        - `provider_business_num` - Provider tax ID for lookup or creation
        - `provider_name` + `provider_business_num` - Required together to create a new provider
        
        #### Request Parameters  
        <table>
          <tr><th>Attributes</th><th>Parameter</th><th>Required</th></tr>
          <tr><td>provider_system_id</td><td>integer</td><td>One of provider identifiers required</td></tr>
          <tr><td>provider_business_num</td><td>string</td><td>Required for new provider</td></tr>
          <tr><td>provider_name</td><td>string</td><td>Required for new provider</td></tr>
          <tr><td>provider_email</td><td>string</td><td>No</td></tr>
          <tr><td>provider_mobile</td><td>string</td><td>No</td></tr>
          <tr><td>provider_business_phone</td><td>string</td><td>No</td></tr>
          <tr><td>po_contact_name</td><td>string</td><td>No</td></tr>
          <tr><td>po_contact_phone</td><td>string</td><td>No</td></tr>
          <tr><td>po_contact_email</td><td>string</td><td>No</td></tr>
          <tr><td>po_contact_pid</td><td>string</td><td>No</td></tr>
          <tr><td>document_lang</td><td>enum (hb, en)</td><td>No (default: hb)</td></tr>
          <tr><td>document_remarks</td><td>string</td><td>No</td></tr>
          <tr><td>document_subject</td><td>string</td><td>No</td></tr>
          <tr><td>document_payment_due_date</td><td>date</td><td>No</td></tr>
          <tr><td>document_no_vat</td><td>bool</td><td>No (default: false)</td></tr>
          <tr><td>document_rounded</td><td>bool</td><td>No (default: false)</td></tr>
          <tr><td>discount</td><td>float</td><td>No (before vat)</td></tr>
          <tr><td>discount_with_vat</td><td>float</td><td>No</td></tr>
          <tr><td>order_id</td><td>string</td><td>No (external order reference)</td></tr>
          <tr><td>send_by_mail</td><td>bool</td><td>No (default: false)</td></tr>
          <tr><td>extra_recipients</td><td>string</td><td>No (comma-separated emails)</td></tr>
          <tr><td>invoice_lines</td><td>array</td><td>Yes</td></tr>
        </table>
        
        #### Invoice Lines Parameters  
        <table>
          <tr><th>Attributes</th><th>Parameter</th><th>Required</th></tr>
          <tr><td>description</td><td>string</td><td>Yes</td></tr>
          <tr><td>price_per_unit</td><td>float</td><td>Yes</td></tr>
          <tr><td>quantity</td><td>float</td><td>No (default: 1)</td></tr>
          <tr><td>no_vat</td><td>bool</td><td>No</td></tr>
          <tr><td>include_vat</td><td>bool</td><td>No</td></tr>
          <tr><td>discount</td><td>float</td><td>No (in NIS)</td></tr>
          <tr><td>discount_with_vat</td><td>float</td><td>No</td></tr>
          <tr><td>catalog_id</td><td>string</td><td>No (makat of catalog item)</td></tr>
          <tr><td>currency_symbol</td><td>string</td><td>No (ILS, USD, EUR)</td></tr>
          <tr><td>conversion_rate</td><td>float</td><td>No</td></tr>
          <tr><td>conversion_date</td><td>date</td><td>No (dd-mm-yyyy)</td></tr>
          <tr><td>supply_date</td><td>date</td><td>No (expected delivery date)</td></tr>
        </table>
      tags:
        - Generate documents
      consumes:
        - application/json
      parameters:
        - name: API_KEY
          in: header
          required: true
          type: string
          description: Company API key
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - api_user
              - invoice_lines
            properties:
              api_user:
                type: string
                description: The email defined as the api_user in the Api Settings
              provider_system_id:
                type: integer
                description: System ID of an existing provider
              provider_business_num:
                type: string
                description: Provider tax ID (business number) for lookup or new provider creation
              provider_name:
                type: string
                description: Provider name (required when creating a new provider)
              provider_email:
                type: string
                description: Provider email address
              provider_mobile:
                type: string
                description: Provider mobile phone
              provider_business_phone:
                type: string
                description: Provider business phone
              po_contact_name:
                type: string
                description: PO contact person name
              po_contact_phone:
                type: string
                description: PO contact person phone
              po_contact_email:
                type: string
                description: PO contact person email
              po_contact_pid:
                type: string
                description: PO contact person ID number
              document_lang:
                type: string
                enum: [hb, en]
                default: hb
                description: Document language (hb=Hebrew, en=English)
              document_remarks:
                type: string
                description: Document remarks
              document_subject:
                type: string
                description: Document subject line
              document_payment_due_date:
                type: string
                format: date
                description: Payment due date
              invoice_date:
                type: string
                format: date
                description: Invoice date (default today)
              document_no_vat:
                type: boolean
                default: false
                description: No VAT on document (default false)
              discount:
                type: number
                description: Document discount before VAT in NIS
              discount_with_vat:
                type: number
                description: Document discount including VAT in NIS
              order_id:
                type: string
                description: External order reference ID
              send_by_mail:
                type: boolean
                default: false
                description: Send document by email to the provider (default false)
              extra_recipients:
                type: string
                description: Comma-separated list of additional email recipients
              invoice_lines:
                type: array
                description: List of order line items (at least one required)
                items:
                  type: object
                  required:
                    - description
                    - price_per_unit
                  properties:
                    description:
                      type: string
                      description: Line item description
                      example: "Office Chair"
                    price_per_unit:
                      type: number
                      description: Price per unit (required, must be numeric)
                      example: 250.75
                    quantity:
                      type: number
                      description: "Quantity (default: 1)"
                      example: 10
                    no_vat:
                      type: boolean
                      description: "No VAT on this line (default: false)"
                    include_vat:
                      type: boolean
                      description: "Price includes VAT (default: false)"
                    discount:
                      type: number
                      description: "Line discount in NIS"
                      example: 15.5
                    discount_with_vat:
                      type: number
                      description: "Line discount including VAT in NIS"
                    catalog_id:
                      type: string
                      description: "Catalog item ID (makat) to link this line to a product"
                      example: "SKU12345"
                    currency_symbol:
                      type: string
                      description: "Currency symbol (default: ILS)"
                      example: "USD"
                    conversion_rate:
                      type: number
                      description: "Currency exchange rate (default: exchange rate on invoice date)"
                      example: 3.65
                    conversion_date:
                      type: string
                      format: date
                      description: "Currency exchange date in dd-mm-yyyy format"
                    supply_date:
                      type: string
                      format: date
                      description: "Expected delivery date for this line item"
                      example: "15-04-2026"
                example:
                  - description: "Office Chair"
                    quantity: 10
                    price_per_unit: 250.75
                    catalog_id: "SKU12345"
                    supply_date: "15-04-2026"
                  - description: "Monitor Stand"
                    quantity: 5
                    price_per_unit: 89.90
                    currency_symbol: "USD"
                    conversion_rate: 3.65
      responses:
        200:
          description: Request accepted and processed
          schema:
            type: object
            properties:
              result:
                type: string
                default: '200'
              description:
                type: string
                default: "Success"
              document_id:
                type: string
                description: Formatted PO document number
              document_system_id:
                type: integer
                description: Internal system ID of the created PO
              document_link:
                type: string
                description: Public URL to view/download the PO document

  /generate_donation_receipt:
    x-summary: Create Donation Receipt
    post:
      operationId: generateDonationReceipt
      description: |
        This endpoint creates a **Donation Receipt** (קבלה על תרומה) in the Payper system.
        Donation receipts are similar to standard receipts but are designated for charitable donations
        and comply with Israeli tax authority requirements for Section 46 donations.
        #### Customer Identification
        At least one of `customer_unique_id`, `customer_mail`, or `customer_system_id` is required.
        #### Request Parameters
        <table>
          <tr><th>Attributes</th><th>Parameter</th><th>Required</th></tr>
          <tr><td>customer_unique_id</td><td>string</td><td>Yes (or customer_mail/customer_system_id)</td></tr>
          <tr><td>customer_mail</td><td>string</td><td>Yes (or customer_unique_id/customer_system_id)</td></tr>
          <tr><td>customer_name</td><td>string</td><td>Required for new customer</td></tr>
          <tr><td>customer_mobile</td><td>string</td><td>No</td></tr>
          <tr><td>customer_address</td><td>string</td><td>No</td></tr>
          <tr><td>customer_system_id</td><td>integer</td><td>No (alternative identifier)</td></tr>
          <tr><td>document_lang</td><td>enum (hb, en)</td><td>No (default: hb)</td></tr>
          <tr><td>document_subject</td><td>string</td><td>No</td></tr>
          <tr><td>document_remarks</td><td>string</td><td>No</td></tr>
          <tr><td>send_by_mail</td><td>bool</td><td>No (default: false)</td></tr>
          <tr><td>invoice_lines</td><td>array</td><td>Yes</td></tr>
          <tr><td>receipt_lines</td><td>array</td><td>Yes</td></tr>
        </table>
        <hr/>
      summary: Create Donation Receipt
      tags:
        - Generate documents
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - api_user
              - invoice_lines
              - receipt_lines
            properties:
              api_user:
                type: string
                description: API user email
              customer_unique_id:
                type: string
                description: Donor business number or personal ID
              customer_mail:
                type: string
                description: Donor email address
              customer_name:
                type: string
                description: Donor full name (required for new donor)
              customer_system_id:
                type: integer
                description: Existing donor system ID
              document_lang:
                type: string
                enum: [hb, en]
                default: hb
              document_subject:
                type: string
              document_remarks:
                type: string
              send_by_mail:
                type: boolean
                default: false
              invoice_lines:
                type: array
                description: Donation line items
                items:
                  type: object
                  properties:
                    description:
                      type: string
                      example: "Donation"
                    price_per_unit:
                      type: number
                      example: 500
                    quantity:
                      type: number
                      default: 1
              receipt_lines:
                type: array
                description: Payment details for the donation
                items:
                  type: object
                  properties:
                    payment_type:
                      type: string
                      enum: [cash, cc, cheque, bank_transfer, bit, paypal]
                    amount:
                      type: number
                    date:
                      type: string
                      format: date
                      description: Payment date (YYYY-MM-DD)
      responses:
        200:
          description: Donation receipt created successfully
          schema:
            type: object
            properties:
              result:
                type: string
                default: '200'
              description:
                type: string
                default: "Success"
              document_id:
                type: string
                description: Formatted document number (e.g. "001-2026")
              document_system_id:
                type: integer
              document_link:
                type: string
        401:
          description: Authentication failed
          schema:
            type: object
            properties:
              result:
                type: string
                example: "110"
              description:
                type: string
                example: "Unknown credentials"
        400:
          description: Validation error
          schema:
            type: object
            properties:
              result:
                type: string
              description:
                type: string

  /invoice_upload:
    x-summary: Invoice Upload
    post:
      description: |
        This endpoint uploads an **expense document** (invoice scan, PDF, or image) to the Payper system
        for OCR processing. Accepted file types: **pdf**, **png**, **jpg**, **jpeg**.
        
        Either `file_url` (accessible URL) or `base64` (encoded content) must be provided.
        The document will be processed asynchronously via OCR.
        <hr/>
      summary: Send digital invoice
      operationId: invoiceUpload
      tags:
        - Finance
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - file_name
              - file_url
              - base64
            properties:
              file_name:
                type: string
                description: "The file name + extension (Can be one of the following: '.pdf','.png','.jpg','.jpeg')"
              file_url:
                type: string
                description: Accessible URL of the invoice (Not required if passing base64)
              base64:
                type: string
                description: The invoice as base64 string (Not required if passing file_url)
              remote_id:
                type: string
                description: ID to be returned on webhooks and pull_expenses end point
      responses:
        200:
          description: Request accepted and processed
          schema:
            type: object
            properties:
              result:
                type: string
                default: '200'
              description:
                type: string
                default: "Success"
              document_system_id:
                type: integer
                description: System ID of the uploaded document
        401:
          description: Authentication failed
          schema:
            type: object
            properties:
              result:
                type: string
                example: "110"
              description:
                type: string
                example: "Unknown credentials"
        400:
          description: Validation error
          schema:
            type: object
            properties:
              result:
                type: string
                description: |
                  Error codes:
                  - **909** — File name not valid (must be name.extension)
                  - **910** — File name missing
                  - **911** — File type not valid (accepts: pdf, png, jpg, jpeg)
                  - **912** — File URL or base64 content missing
                  - **915** — Error receiving/downloading file
              description:
                type: string
