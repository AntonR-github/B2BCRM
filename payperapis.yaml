  /get_stock_for_item:
    x-summary: Get quantity for item
    post:
      description: |
        This endpoint retrieves the quantity of a specific item in the inventory by its catalog item ID (SKU/makat).
        #### Request Parameters
        <table>
          <tr><th>Attributes</th><th>Parameter</th><th>Required</th></tr>
          <tr><td>catalog_item_id</td><td>string</td><td>Yes</td></tr>
        </table>
        <hr/>
      summary: Get quantity of a certain item in the inventory
      operationId: getStockForItem
      tags:
        - Inventory
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - api_user
              - catalog_item_id
            properties:
              api_user:
                type: string
                description: API user email
              catalog_item_id:
                type: string
                description: Item SKU / makat to look up
                example: "SKU12345"
      responses:
        200:
          description: Request accepted and processed
          schema:
            type: object
            properties:
              result:
                type: string
                default: '200'
              description:
                type: string
                default: "Success"
              catalog_item_id:
                type: string
              catalog_item_name:
                type: string
              quantity:
                type: integer

securityDefinitions:
  ApiKeyAuth:
    type: apiKey
    name: API_KEY
    in: header
    description: |
      All requests must include an <b>api_key</b> in the header and an <b>api_user</b> in the request parameters.  
      <br/>**Example:**  
      ```plaintext
      request.headers["API_KEY"] = '9b0452845ec0a37c9594'
      request.body["api_user"] = 'api@user'