  /generate_receipt:
    x-summary: Create Receipt
    post:
      description: |
        This endpoint creates a **Receipt** (קבלה) in the Payper system.
        Receipts require both `invoice_lines` and `receipt_lines` (payment details).
        
        #### Request Parameters  
        <table>
          <tr><th>Attributes</th><th>Parameter</th><th>Required</th></tr>
